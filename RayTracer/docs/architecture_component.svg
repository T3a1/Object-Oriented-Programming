<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <style>
    .box { fill:#f7f9fb; stroke:#2b6cb0; stroke-width:2 }
    .small { font: 12px/1 "Segoe UI", Roboto, Arial; fill:#0b1626 }
    .title { font: 14px/1 "Segoe UI", Roboto, Arial; fill:#073b6b; font-weight:700 }
    .arrow { stroke:#2b6cb0; stroke-width:2; fill:none; marker-end:url(#arrowhead) }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b6cb0" />
    </marker>
  </defs>

  <!-- Repo root cluster -->
  <rect x="30" y="20" width="940" height="120" rx="8" class="box" />
  <text x="50" y="45" class="title">Repository Root</text>

  <!-- Executable -->
  <rect x="60" y="70" width="220" height="60" rx="6" class="box" />
  <text x="70" y="95" class="small">raytracer</text>
  <text x="70" y="112" class="small">(executable)</text>

  <!-- Core lib -->
  <rect x="320" y="70" width="260" height="60" rx="6" class="box" />
  <text x="330" y="95" class="small">raytracer_core</text>
  <text x="330" y="112" class="small">(shared library)</text>

  <!-- Plugins -->
  <rect x="620" y="70" width="320" height="60" rx="6" class="box" />
  <text x="630" y="95" class="small">plugins/</text>
  <text x="630" y="112" class="small">libprimitives.so, liblights.so</text>

  <!-- Scenes -->
  <rect x="60" y="210" width="220" height="60" rx="6" class="box" />
  <text x="70" y="235" class="small">scenes/</text>
  <text x="70" y="252" class="small">*.cfg files</text>

  <!-- Core internals -->
  <rect x="320" y="200" width="620" height="160" rx="8" class="box" />
  <text x="330" y="225" class="title">Core components</text>
  <text x="340" y="250" class="small">Shapes, Factories (ShapeFactory, LightFactory)</text>
  <text x="340" y="270" class="small">Scene, Camera, Ray, BVH</text>
  <text x="340" y="290" class="small">SceneBuilders (LibConfig, HardCoded)</text>

  <!-- arrows -->
  <path class="arrow" d="M280 100 L320 100" />
  <path class="arrow" d="M580 100 L620 100" />
  <path class="arrow" d="M180 240 L320 240" />
  <path class="arrow" d="M520 140 L520 200" />
  <path class="arrow" d="M680 140 L680 200" />

  <!-- labels on arrows -->
  <text x="340" y="140" class="small">links &amp; loads</text>
  <text x="560" y="140" class="small">dlopen plugins</text>
  <text x="220" y="220" class="small">reads</text>

  <!-- footer note -->
  <text x="40" y="395" class="small">Diagram: top row = runtime artifacts; bottom = core internal modules that the executable uses.</text>
</svg>
